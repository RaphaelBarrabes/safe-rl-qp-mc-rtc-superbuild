version: 2
updates:
  # Keep GitHub Actions versions (actions/checkout@v4, etc.) up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep the devcontainer's base image up to date
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "devcontainer"
